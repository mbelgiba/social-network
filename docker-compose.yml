version: '3.8'

services:
  # БЭКЕНД ҚЫЗМЕТІ (Go API)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: social-backend
    ports:
      - "8080:8080"
    volumes:
      # Деректер қоры мен жүктелген суреттер контейнер өшсе де сақталып тұруы үшін
      - backend_data:/app/data
      - backend_uploads:/app/uploads
    environment:
      - DB_PATH=/app/data/social_network.db
      - PORT=8080
    restart: unless-stopped
    networks:
      - social_network_net

  # ФРОНТЕНД ҚЫЗМЕТІ (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: social-frontend
    ports:
      - "3000:3000"
    # Бэкенд қосылмай тұрып фронтенд іске қосылмауы керек
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - social_network_net

# Контейнерлер арасындағы ішкі желі
networks:
  social_network_net:
    driver: bridge

# Деректерді тұрақты сақтауға арналған томдар (Volumes)
volumes:
  backend_data:
  backend_uploads: